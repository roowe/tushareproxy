name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            binary_ext: ""
            archive_ext: tar.gz
          - goos: linux
            goarch: arm64
            binary_ext: ""
            archive_ext: tar.gz
          - goos: darwin
            goarch: amd64
            binary_ext: ""
            archive_ext: tar.gz
          - goos: darwin
            goarch: arm64
            binary_ext: ""
            archive_ext: tar.gz
          - goos: windows
            goarch: amd64
            binary_ext: .exe
            archive_ext: zip
          - goos: windows
            goarch: arm64
            binary_ext: .exe
            archive_ext: zip

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          PACKAGE_BASENAME="tushareproxy_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.goarch }}"
          BINARY_NAME="tushareproxy${{ matrix.binary_ext }}"
          mkdir -p "dist/${PACKAGE_BASENAME}"
          go build -trimpath -ldflags="-s -w" -o "dist/${PACKAGE_BASENAME}/${BINARY_NAME}" .

      - name: Package archive
        run: |
          PACKAGE_BASENAME="tushareproxy_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.goarch }}"
          cd dist
          if [[ "${{ matrix.archive_ext }}" == "zip" ]]; then
            zip -r "${PACKAGE_BASENAME}.zip" "${PACKAGE_BASENAME}"
          else
            tar -czf "${PACKAGE_BASENAME}.tar.gz" "${PACKAGE_BASENAME}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/tushareproxy_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.goarch }}.${{ matrix.archive_ext }}

  release:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
